<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Are You Gay?</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #fff1eb, #fad0c4, #fad0c4, #fff1eb, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            text-align: center;
            /* Using standard padding with fallback for safe areas */
            padding: 20px;
            padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
            color: #333;
            box-sizing: border-box;
        }

        .content-wrapper {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            /* Responsive font size: smaller base for mobile, larger cap for desktop */
            font-size: clamp(2.2rem, 12vw, 4.5rem);
            font-weight: 900;
            color: #000000;
            /* Simplified shadow for better legibility on mobile */
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #ff69b4;
            margin: 0 0 20px 0;
            letter-spacing: -1px; /* Tighter spacing for modern look */
            line-height: 1.1;
            animation: titleFloat 3s ease-in-out infinite alternate;
            word-wrap: break-word;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: rotate(2deg);
            transition: transform 0.3s ease;
            border: 5px solid #fff;
        }

        img:hover {
            transform: rotate(0deg) scale(1.02);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes titleFloat {
            from { transform: translateY(0px); }
            to { transform: translateY(-10px); }
        }

        /* Mobile Specific Optimization */
        @media (max-width: 480px) {
            h1 {
                text-shadow: 2px 2px 0px #fff, 3px 3px 0px #ff69b4; /* Even simpler shadow */
                letter-spacing: -0.5px;
            }
            
            img {
                width: 95%;
                border-width: 3px;
                transform: rotate(0deg); /* Straighten image for more space on tiny screens */
            }
        }

        @media (prefers-reduced-motion: reduce) {
            body, h1, img {
                animation: none !important;
                transition: none !important;
                transform: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <h1>WHY ARE YOU GAY?</h1>
        <img src="gay.png" alt="Gay Rainbow Image">
    </div>
</body>
</html>
