<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Are You Gay?</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #fff1eb, #fad0c4, #fad0c4, #fff1eb, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            padding-top: max(20px, env(safe-area-inset-top));
            padding-right: max(20px, env(safe-area-inset-right));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            padding-left: max(20px, env(safe-area-inset-left));
            color: #333;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: bold;
            color: #ff1493;
            text-shadow: 
                2px 2px 0 #ff69b4,
                4px 4px 0 #ff1493,
                6px 6px 0 #db7093;
            margin-bottom: clamp(15px, 4vw, 30px);
            letter-spacing: 2px;
            position: relative;
            animation: titleFloat 3s ease-in-out infinite alternate;
            line-height: 1.2;
        }

        img {
            max-width: 90%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: rotate(2deg);
            transition: transform 0.3s ease;
            border: 3px solid #fff;
            margin: 0 auto;
        }

        img:hover {
            transform: rotate(-2deg) scale(1.03);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes titleFloat {
            from { transform: translateY(0px); }
            to { transform: translateY(-8px); }
        }

        /* Reduce motion for users who prefer it */
        @media (prefers-reduced-motion: reduce) {
            body {
                animation: none;
            }
            
            h1 {
                animation: none;
            }
            
            img {
                transition: none;
            }
        }

        /* Additional breakpoints for better control */
        @media (max-width: 480px) {
            h1 {
                letter-spacing: 1px;
            }
            
            img {
                border-radius: 15px;
                box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            }
        }

        @media (max-width: 320px) {
            h1 {
                font-size: clamp(1.5rem, 10vw, 2.5rem);
            }
            
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <h1>WHY ARE YOU GAY ?</h1>
    <img src="gay.png" alt="Gay Rainbow Image">
</body>
</html>
