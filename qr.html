<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Are You Gay?</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #fff1eb, #fad0c4, #fad0c4, #fff1eb, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            padding: 20px;
            color: #333;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: bold;
            color: #ff1493;
            text-shadow: 
                2px 2px 0 #ff69b4,
                4px 4px 0 #ff1493,
                6px 6px 0 #db7093;
            margin-bottom: 30px;
            letter-spacing: 2px;
            position: relative;
            animation: titleFloat 3s ease-in-out infinite alternate;
        }

        img {
            max-width: 80%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transform: rotate(2deg);
            transition: transform 0.3s ease;
            border: 5px solid #fff;
        }

        img:hover {
            transform: rotate(-2deg) scale(1.05);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes titleFloat {
            from { transform: translateY(0px); }
            to { transform: translateY(-10px); }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <h1>WHY ARE YOU GAY ?</h1>
    <img src="gay.png" alt="Gay Rainbow Image">
</body>
</html>
